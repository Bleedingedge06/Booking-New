
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CENVIRA - Professional Cleaning Booking</title>
    <meta http-equiv="X-Frame-Options" content="DENY">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #ffffff;
        --bg-main: #354F52;
        --card-text: #7EA172;
      }
      
      @property --border-angle {
        syntax: "<angle>";
        initial-value: 0deg;
        inherits: false;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-main);
        color: #f8fafc;
      }
      
      .font-heading {
        font-family: 'Space Grotesk', sans-serif;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #354F52;
      }
      ::-webkit-scrollbar-thumb {
        background: #2f4448;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #243538;
      }
      
      /* Static Glass Effect (Hover removed) */
      .premium-card-container {
        perspective: 1200px;
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      .premium-card {
        position: relative;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
        z-index: 1;
        width: 100%;
        overflow: hidden;
      }
      
      /* Target text inside cards */
      .premium-card p, 
      .premium-card label, 
      .premium-card span,
      .premium-card select,
      .premium-card input {
        color: var(--card-text) !important;
      }
      
      /* Headings allowed to have overrides */
      .premium-card h3 {
        color: var(--card-text);
      }

      /* Specular Highlight for Liquid Look */
      .premium-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg, 
          rgba(255, 255, 255, 0.12) 0%, 
          rgba(255, 255, 255, 0.05) 20%, 
          transparent 40%, 
          rgba(255, 255, 255, 0.02) 100%
        );
        pointer-events: none;
        z-index: 2;
      }

      /* Running border line - static opacity */
      .premium-card::after {
        content: "";
        position: absolute;
        inset: -1px; 
        border-radius: inherit;
        padding: 1.5px;
        background: conic-gradient(
          from var(--border-angle),
          transparent 0%,
          transparent 70%,
          rgba(149, 129, 141, 0.2) 85%,
          #95818D 100%
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: border-angle-rotate 5s linear infinite;
        pointer-events: none;
        z-index: 5;
        opacity: 0.3;
        transition: opacity 0.3s ease;
      }

      @keyframes border-angle-rotate {
        from { --border-angle: 0deg; }
        to { --border-angle: 360deg; }
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(0.6) sepia(1) saturate(5) hue-rotate(60deg);
        opacity: 0.8;
      }
      
      select option {
        background-color: #354F52;
        color: #7EA172;
      }
      
      /* Modal Glass */
      .modal-glass {
        background: rgba(45, 68, 71, 0.95);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      select {
        color-scheme: dark;
      }

      @media (max-width: 640px) {
        .premium-card {
          border-radius: 1.25rem;
        }
      }
    </style>

{
